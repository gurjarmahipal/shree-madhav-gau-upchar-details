<!DOCTYPE html>
<html>
<head>
  <title>श्री माधव गौ उपचार</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      border: 2px solid #f2c38b;
    }

    /* ✅ CLEAN LOGO (NO DOUBLE LOOK) */
    .logo-wrapper {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: auto;
      background: #000; /* outer black */
      padding: 3px; /* thinner */
    }

    .logo-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #fff; /* white ring */
      padding: 3px;
    }

    .logo-inner img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    h1 {
      color: red;
      margin: 10px 0 5px;
      font-size: 26px;
    }

    h2 {
      color: brown;
      margin: 5px;
      font-size: 18px;
    }

    .icons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      justify-items: center;
      margin: 25px 0;
    }

    .icon {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 26px;
      color: white;
      text-decoration: none;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .whatsapp { background: #25D366; }
    .youtube { background: #FF0000; }
    .facebook { background: #1877F2; }

    .instagram {
      background: radial-gradient(circle at 30% 30%, #feda75, #d62976, #962fbf);
    }

    .center {
      background: #fff;
      color: #000;
      border: 2px solid #f2c38b;
      font-size: 14px;
      font-weight: bold;
      width: 70px;
      height: 70px;
    }

    /* 🔥 CUSTOM SHIFT (IMPORTANT FIX) */
    .shift-left {
      transform: translateX(-15px);
    }

    .bottom-btn {
      margin-top: 25px;
      padding: 14px;
      border-radius: 30px;
      background: linear-gradient(to right, #ff9800, #ff7a00);
      color: white;
      text-decoration: none;
      display: block;
      font-weight: bold;
      font-size: 16px;
    }

  </style>
</head>

<body>

<div class="card">

  <!-- LOGO -->
  <div class="logo-wrapper">
    <div class="logo-inner">
      <img src="Logo.jpg">
    </div>
  </div>

  <!-- TITLE -->
  <h1>श्री माधव गौ उपचार केंद्र</h1>
  <h2>गुलाबपुरा</h2>

  <!-- ICONS -->
  <div class="icons">

    <!-- Row 1 -->
    <a class="icon whatsapp" href="https://wa.me/qr/R7KT3YUXJET7H1">
      <i class="fab fa-whatsapp"></i>
    </a>

    <div class="icon center">Connect</div>

    <a class="icon youtube" href="https://youtube.com/@shreemadhavgauupchar?si=rdgeQqr_9s1T6xdX">
      <i class="fab fa-youtube"></i>
    </a>

    <!-- Row 2 -->
    <div class="icon instagram shift-left" href="https://www.instagram.com/shree_madhav_gau_upchar_?igsh=MWt3NndoODg4eDZrdA==">
      <i class="fab fa-instagram"></i>
    </div>

    <div></div>

    <a class="icon facebook" href="https://www.facebook.com/share/1HxxBmuwdZ/">
      <i class="fab fa-facebook-f"></i>
    </a>

  </div>

  <!-- BUTTON -->
  <a class="bottom-btn" href="https://maps.app.goo.gl/ekmX2Z5gZvruHmpU6?g_st=ac">
    🌐 Visit Location
  </a>

</div>

</body>
</html>
