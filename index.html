<!DOCTYPE html>
<html>
<head>
  <title>श्री माधव गौ उपचार</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      border: 2px solid #f2c38b;
    }

    /* LOGO */
    .logo-wrapper {
      width: 120px;
      height: 120px;
      margin: auto;
      border-radius: 50%;
      background: #fff;
      padding: 4px;
      box-shadow: 0 0 0 3px #000; /* clean black border */
    }

    .logo-inner img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    h1 {
      color: red;
      margin: 10px 0 5px;
      font-size: 26px;
    }

    h2 {
      color: brown;
      margin: 5px;
      font-size: 18px;
    }

    .icons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      justify-items: center;
      margin: 25px 0;
    }

    .icon {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 26px;
      color: white;
      text-decoration: none;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .whatsapp { background: #25D366; }
    .youtube { background: #FF0000; }
    .facebook { background: #1877F2; }

    .instagram {
      background: radial-gradient(circle at 30% 30%, #feda75, #d62976, #962fbf);
    }

    .center {
      background: #fff;
      color: #000;
      border: 2px solid #f2c38b;
      font-size: 14px;
      font-weight: bold;
      width: 70px;
      height: 70px;
    }

    .bottom-btn {
      margin-top: 25px;
      padding: 14px;
      border-radius: 30px;
      background: linear-gradient(to right, #ff9800, #ff7a00);
      color: white;
      text-decoration: none;
      display: block;
      font-weight: bold;
      font-size: 16px;
    }

    /* 🔥 FLOATING CALL BUTTON */
    .fab-call {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 65px;
      height: 65px;
      background: #28a745;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 26px;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      z-index: 1000;
    }

    .fab-call:active {
      transform: scale(0.9);
    }

  </style>
</head>

<body>

<div class="card">

  <!-- LOGO -->
  <div class="logo-wrapper">
    <div class="logo-inner">
      <img src="Logo.jpg">
    </div>
  </div>

  <!-- TITLE -->
  <h1>श्री माधव गौ उपचार केंद्र</h1>
  <h2>गुलाबपुरा</h2>

  <!-- ICONS -->
  <div class="icons">

    <a class="icon whatsapp" href="https://wa.me/qr/R7KT3YUXJET7H1">
      <i class="fab fa-whatsapp"></i>
    </a>

    <div class="icon center">Connect</div>

    <a class="icon youtube" href="https://youtube.com/@shreemadhavgauupchar?si=rdgeQqr_9s1T6xdX">
      <i class="fab fa-youtube"></i>
    </a>

    <a class="icon instagram" href="https://www.instagram.com/shree_madhav_gau_upchar_?igsh=MWt3NndoODg4eDZrdA==">
      <i class="fab fa-instagram"></i>
    </a>

    <div></div>

    <a class="icon facebook" href="https://www.facebook.com/share/1HxxBmuwdZ/">
      <i class="fab fa-facebook-f"></i>
    </a>

  </div>

  <!-- LOCATION BUTTON -->
  <a class="bottom-btn" 
     href="https://www.google.com/maps?q=VMQ7+VP,Gulabpura,Rajasthan" 
     target="_blank">
     🌐 Visit Location
  </a>

</div>

<!-- 🚀 FLOATING CALL BUTTON -->
<a class="fab-call" href="tel:9529080097">
  <i class="fas fa-phone"></i>
</a>

</body>
</html>
