<!DOCTYPE html>
<html>
<head>
  <title>गौ सम्मान अभियान</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      border: 2px solid #f2c38b;
    }

    .logo {
      width: 110px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    h1 {
      color: red;
      margin: 5px;
      font-size: 28px;
    }

    h2 {
      color: brown;
      margin: 5px;
      font-size: 20px;
    }

    .icons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 20px 0;
    }

    .icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      color: white;
      text-decoration: none;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .whatsapp { background: #25D366; }
    .youtube { background: #FF0000; }
    .facebook { background: #1877F2; }
    .instagram { background: #E1306C; }
    .map { background: #ff9800; }
    .center {
      background: #fff;
      color: #000;
      border: 2px solid #f2c38b;
      font-size: 14px;
    }

    .bottom-btn {
      margin-top: 20px;
      padding: 12px;
      border-radius: 30px;
      background: orange;
      color: white;
      text-decoration: none;
      display: block;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="card">

  <!-- LOGO -->
  <img src="Logo.jpg" class="logo">

  <!-- TITLE -->
  <h1>गौ सम्मान</h1>
  <h2>आह्वान अभियान</h2>

  <!-- ICONS -->
  <div class="icons">

    <a class="icon whatsapp" href="https://wa.me/qr/R7KT3YUXJET7H1">
      <i class="fab fa-whatsapp"></i>
    </a>

    <a class="icon center" href="#">
      Connect
    </a>

    <a class="icon youtube" href="https://youtube.com/@shreemadhavgauupchar?si=rdgeQqr_9s1T6xdX">
      <i class="fab fa-youtube"></i>
    </a>

    <a class="icon map" href="https://maps.app.goo.gl/ekmX2Z5gZvruHmpU6?g_st=ac">
      <i class="fas fa-map-marker-alt"></i>
    </a>

    <a class="icon instagram" href="https://www.instagram.com/shree_madhav_gau_upchar_?igsh=MWt3NndoODg4eDZrdA==">
      <i class="fab fa-instagram"></i>
    </a>

    <a class="icon facebook" href="https://www.facebook.com/share/1HxxBmuwdZ/">
      <i class="fab fa-facebook-f"></i>
    </a>

  </div>

  <!-- BUTTON -->
  <a class="bottom-btn" href="https://maps.app.goo.gl/ekmX2Z5gZvruHmpU6?g_st=ac">
    🌐 Visit Location
  </a>

</div>

</body>
</html>
