      align-items: center;

    }

    .upi-box span {
      word-break: break-all;   /* ✅ multiline wrap */

      text-align: left;
      flex: 1;
    }

    .upi-box button {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background: #ff7a00;
      color: white;
      font-size: 12px;
